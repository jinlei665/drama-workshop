# Drama Studio - 本地开发环境配置
# 包含：MySQL 数据库 + MinIO 对象存储

version: '3.8'

services:
  # ==================== MySQL 数据库 ====================
  mysql:
    image: mysql:8.0
    container_name: drama-studio-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: drama_studio
      MYSQL_USER: drama_user
      MYSQL_PASSWORD: drama123456
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/init-mysql.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - drama-network

  # ==================== MinIO 对象存储 ====================
  minio:
    image: minio/minio:latest
    container_name: drama-studio-minio
    ports:
      - "9000:9000"      # API 端口
      - "9001:9001"      # 控制台端口
    environment:
      # 新版本 MinIO (2022+) 使用这两个变量
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      # 旧版本 MinIO 兼容（某些镜像可能需要）
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped
    networks:
      - drama-network

  # ==================== Adminer (数据库管理界面，可选) ====================
  adminer:
    image: adminer:latest
    container_name: drama-studio-adminer
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
    depends_on:
      - mysql
    restart: unless-stopped
    networks:
      - drama-network

# ==================== 数据卷 ====================
volumes:
  mysql-data:
    driver: local
  minio-data:
    driver: local

# ==================== 网络 ====================
networks:
  drama-network:
    driver: bridge
